<label class="page-size-select">
  <span class="page-size-select__label">Mostrar</span>
  <select class="page-size-select__control" [value]="value" (change)="onChange($event)">
    @for (option of options; track option) {
      <option [value]="option">{{ option }}</option>
    }
  </select>
</label>
