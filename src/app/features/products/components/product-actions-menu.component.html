<div class="actions-menu">
  <button
    type="button"
    class="actions-menu__trigger"
    [attr.aria-label]="'Abrir acciones de ' + productName"
    [attr.aria-expanded]="isOpen()"
    (click)="toggleMenu()"
  >
    ...
  </button>

  @if (isOpen()) {
    <div class="actions-menu__dropdown" role="menu">
      <button type="button" class="actions-menu__item" role="menuitem" (click)="handleEdit()">
        Editar
      </button>
      <button
        type="button"
        class="actions-menu__item actions-menu__item--danger"
        role="menuitem"
        (click)="handleDelete()"
      >
        Eliminar
      </button>
    </div>
  }
</div>
